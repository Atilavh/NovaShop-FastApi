services:
  db:
    image: postgres:16
    container_name: novashop_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: novashop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend: 
    build: . 
    container_name: backend
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app

  redis:
    image: redis:7
    container_name: novashop_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  locust:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novashop_locust
    depends_on:
      - backend
    ports:
      - "8089:8089"
    command: >
      locust
      -f app/utils/locustfile.py
      --host=http://backend:8000
    volumes:
      - .:/app
volumes:
  postgres_data:
  redis_data: